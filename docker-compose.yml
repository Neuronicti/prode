version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prode
      POSTGRES_PASSWORD: prode
      POSTGRES_DB: prode
    volumes:
      - ./docker/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - prode_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prode"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./docker/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://prode:prode@db:5432/prode
      JWT_SECRET: your-secret-key-change-in-production
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  prode_db_data:
